name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - stable

env:
  R2_BUCKET: snapdog-updates
  UPDATE_BASE_URL: https://update.snapdog.cc/os
  BUILDROOT_VERSION: "2025.02"
  TOOLCHAIN: aarch64-none-linux-gnu

jobs:
  build-ctrl:
    name: Build snapdog-ctrl (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git describe

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: snapdog-ctrl
          key: aarch64-release

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: snapdog-ctrl/webui/package-lock.json

      - name: Install aarch64 linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cd snapdog-ctrl/webui && npm ci && npm run build && cd ../..
          cd snapdog-ctrl && cargo build --release --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/snapdog-ctrl ../snapdog-ctrl-binary

      - uses: actions/upload-artifact@v4
        with:
          name: snapdog-ctrl-binary
          path: snapdog-ctrl-binary

  build-image:
    name: Build image (${{ matrix.pi }})
    runs-on: ubuntu-latest
    needs: build-ctrl
    strategy:
      matrix:
        pi: [pi3, pi4, pi5]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: snapdog-ctrl-binary

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget cpio unzip rsync bc \
            python3 file libncurses-dev libssl-dev

      - name: Cache buildroot sources
        uses: actions/cache@v4
        with:
          path: |
            ../buildroot-src
            ../buildroot-${{ matrix.pi }}/build/toolchain-*
            ../buildroot-${{ matrix.pi }}/host
          key: buildroot-${{ env.BUILDROOT_VERSION }}-${{ matrix.pi }}-${{ hashFiles('buildroot/configs/override.conf') }}
          restore-keys: |
            buildroot-${{ env.BUILDROOT_VERSION }}-${{ matrix.pi }}-

      - name: Setup buildroot
        run: |
          if [ ! -d ../buildroot-src ]; then
            git clone --depth 1 --branch ${{ env.BUILDROOT_VERSION }} \
              https://github.com/buildroot/buildroot ../buildroot-src
          fi
          rm -f ../buildroot && ln -s buildroot-src ../buildroot
          # Fix genimage partition size
          if [ -f ../buildroot/board/raspberrypi/genimage.cfg.in ]; then
            sed -i 's/32M/256M/g' ../buildroot/board/raspberrypi/genimage.cfg.in
          fi

      - name: Inject snapdog-ctrl binary
        run: |
          # Place pre-built binary where buildroot can find it
          mkdir -p buildroot/board/raspberrypi/overlay/usr/bin
          cp snapdog-ctrl-binary buildroot/board/raspberrypi/overlay/usr/bin/snapdog-ctrl
          chmod 755 buildroot/board/raspberrypi/overlay/usr/bin/snapdog-ctrl

      - name: Configure
        run: make PI=${{ matrix.pi }} config

      - name: Build
        run: make PI=${{ matrix.pi }} build

      - name: Package image
        id: package
        run: |
          VERSION=$(cat VERSION)
          IMG="../buildroot-${{ matrix.pi }}/images/sdcard.img"
          OUT="snapdog-os-${{ matrix.pi }}-${VERSION}.img.gz"
          gzip -c "$IMG" > "$OUT"
          SHA=$(sha256sum "$OUT" | awk '{print $1}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image=${OUT}" >> $GITHUB_OUTPUT
          echo "sha256=${SHA}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.pi }}
          path: ${{ steps.package.outputs.image }}

    outputs:
      version: ${{ steps.package.outputs.version }}

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine channel
        id: channel
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "channel=stable" >> $GITHUB_OUTPUT
          else
            echo "channel=${{ inputs.channel || 'beta' }}" >> $GITHUB_OUTPUT
          fi

      - name: Install AWS CLI
        run: sudo apt-get install -y awscli

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: auto
        run: |
          VERSION=${{ needs.build-image.outputs.version }}
          CHANNEL=${{ steps.channel.outputs.channel }}

          for pi in pi3 pi4 pi5; do
            IMAGE="artifacts/image-${pi}/snapdog-os-${pi}-${VERSION}.img.gz"
            [ -f "$IMAGE" ] || continue

            # Upload image
            aws s3 cp "$IMAGE" "s3://${R2_BUCKET}/os/images/" \
              --endpoint-url "$AWS_ENDPOINT_URL"

            # Generate and upload metadata
            SHA=$(sha256sum "$IMAGE" | awk '{print $1}')
            METADATA=$(jq -n \
              --arg v "$VERSION" \
              --arg u "${UPDATE_BASE_URL}/images/snapdog-os-${pi}-${VERSION}.img.gz" \
              --arg s "$SHA" \
              '{version: $v, url: $u, sha256: $s}')

            echo "$METADATA" | aws s3 cp - \
              "s3://${R2_BUCKET}/os/metadata/${CHANNEL}/${pi}.json" \
              --content-type "application/json" \
              --endpoint-url "$AWS_ENDPOINT_URL"
          done

          # Stable releases also update beta channel
          if [ "$CHANNEL" = "stable" ]; then
            for pi in pi3 pi4 pi5; do
              aws s3 cp \
                "s3://${R2_BUCKET}/os/metadata/stable/${pi}.json" \
                "s3://${R2_BUCKET}/os/metadata/beta/${pi}.json" \
                --endpoint-url "$AWS_ENDPOINT_URL"
            done
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.img.gz
          generate_release_notes: true
