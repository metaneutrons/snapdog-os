name: Release

on:
  push:
    branches: [main]

env:
  R2_BUCKET: snapdog-updates
  UPDATE_BASE_URL: https://update.snapdog.cc/os
  BUILDROOT_VERSION: "2025.02"

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-ctrl:
    name: Build snapdog-ctrl
    runs-on: ubuntu-latest
    needs: release-please
    # Always build (beta or stable)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: snapdog-ctrl
          key: aarch64-release

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: snapdog-ctrl/webui/package-lock.json

      - name: Install aarch64 linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cd snapdog-ctrl/webui && npm ci && npm run build && cd ../..
          cd snapdog-ctrl && cargo build --release --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/snapdog-ctrl ../snapdog-ctrl-binary

      - uses: actions/upload-artifact@v4
        with:
          name: snapdog-ctrl-binary
          path: snapdog-ctrl-binary

  build-image:
    name: Build image (${{ matrix.pi }})
    runs-on: ubuntu-latest
    needs: [release-please, build-ctrl]
    strategy:
      matrix:
        pi: [pi3, pi4, pi5]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: snapdog-ctrl-binary

      - name: Determine version
        id: version
        run: |
          if [ "${{ needs.release-please.outputs.release_created }}" = "true" ]; then
            echo "version=${{ needs.release-please.outputs.version }}" >> $GITHUB_OUTPUT
            echo "channel=stable" >> $GITHUB_OUTPUT
          else
            BASE=$(cat VERSION)
            echo "version=${BASE}-beta.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "channel=beta" >> $GITHUB_OUTPUT
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget cpio unzip rsync bc \
            python3 file libncurses-dev libssl-dev \
            dosfstools mtools e2fsprogs

      - name: Cache buildroot
        uses: actions/cache@v4
        with:
          path: |
            ../buildroot-src
            ../buildroot-${{ matrix.pi }}/build/toolchain-*
            ../buildroot-${{ matrix.pi }}/host
          key: buildroot-${{ env.BUILDROOT_VERSION }}-${{ matrix.pi }}-${{ hashFiles('buildroot/configs/override.conf') }}
          restore-keys: |
            buildroot-${{ env.BUILDROOT_VERSION }}-${{ matrix.pi }}-

      - name: Setup buildroot
        run: |
          if [ ! -d ../buildroot-src ]; then
            git clone --depth 1 --branch ${{ env.BUILDROOT_VERSION }} \
              https://github.com/buildroot/buildroot ../buildroot-src
          fi
          rm -f ../buildroot && ln -s buildroot-src ../buildroot
          if [ -f ../buildroot/board/raspberrypi/genimage.cfg.in ]; then
            sed -i 's/32M/256M/g' ../buildroot/board/raspberrypi/genimage.cfg.in
          fi

      - name: Inject snapdog-ctrl
        run: |
          mkdir -p buildroot/board/raspberrypi/overlay/usr/bin
          cp snapdog-ctrl-binary buildroot/board/raspberrypi/overlay/usr/bin/snapdog-ctrl
          chmod 755 buildroot/board/raspberrypi/overlay/usr/bin/snapdog-ctrl

      - name: Write version to image
        run: |
          mkdir -p buildroot/board/raspberrypi/overlay/etc
          echo "${{ steps.version.outputs.version }}" > buildroot/board/raspberrypi/overlay/etc/snapdog-os.version

      - name: Build
        run: |
          make PI=${{ matrix.pi }} config
          make PI=${{ matrix.pi }} build

      - name: Package
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMG="../buildroot-${{ matrix.pi }}/images/sdcard.img"
          OUT="snapdog-os-${{ matrix.pi }}-${VERSION}.img.gz"
          gzip -c "$IMG" > "$OUT"
          
          UPDATE_ARC="snapdog-os-${{ matrix.pi }}-${VERSION}-update.tar.gz"
          tar -czf "$UPDATE_ARC" -C "../buildroot-${{ matrix.pi }}/images" rootfs.ext4
          
          echo "image=${OUT}" >> $GITHUB_OUTPUT
          echo "update_archive=${UPDATE_ARC}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.pi }}
          path: |
            ${{ steps.package.outputs.image }}
            ${{ steps.package.outputs.update_archive }}

    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [release-please, build-image]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install tools
        run: sudo apt-get install -y awscli jq

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: auto
        run: |
          if [ "${{ needs.release-please.outputs.release_created }}" = "true" ]; then
            VERSION="${{ needs.release-please.outputs.version }}"
            CHANNEL="stable"
          else
            VERSION="$(cat VERSION)-beta.${{ github.run_number }}"
            CHANNEL="beta"
          fi

          for pi in pi3 pi4 pi5; do
            IMAGE="artifacts/image-${pi}/snapdog-os-${pi}-${VERSION}.img.gz"
            UPDATE_ARC="artifacts/image-${pi}/snapdog-os-${pi}-${VERSION}-update.tar.gz"
            [ -f "$IMAGE" ] || continue
            [ -f "$UPDATE_ARC" ] || continue

            aws s3 cp "$IMAGE" "s3://${R2_BUCKET}/os/images/" \
              --endpoint-url "$AWS_ENDPOINT_URL"

            aws s3 cp "$UPDATE_ARC" "s3://${R2_BUCKET}/os/updates/" \
              --endpoint-url "$AWS_ENDPOINT_URL"

            SHA=$(sha256sum "$UPDATE_ARC" | awk '{print $1}')
            METADATA=$(jq -n \
              --arg v "$VERSION" \
              --arg u "${UPDATE_BASE_URL}/updates/snapdog-os-${pi}-${VERSION}-update.tar.gz" \
              --arg s "$SHA" \
              '{version: $v, url: $u, sha256: $s}')

            echo "$METADATA" | aws s3 cp - \
              "s3://${R2_BUCKET}/os/metadata/${CHANNEL}/${pi}.json" \
              --content-type "application/json" \
              --endpoint-url "$AWS_ENDPOINT_URL"
          done

          # Stable also updates beta
          if [ "$CHANNEL" = "stable" ]; then
            for pi in pi3 pi4 pi5; do
              aws s3 cp \
                "s3://${R2_BUCKET}/os/metadata/stable/${pi}.json" \
                "s3://${R2_BUCKET}/os/metadata/beta/${pi}.json" \
                --endpoint-url "$AWS_ENDPOINT_URL"
            done
          fi

      - name: Attach images to GitHub Release
        if: needs.release-please.outputs.release_created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            artifacts/**/*.img.gz
            artifacts/**/*-update.tar.gz
