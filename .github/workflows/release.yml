# Release pipeline
name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - "assets/**"
      - ".githooks/**"
      - ".github/dependabot.yml"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  R2_BUCKET: snapdog-updates
  BUILDROOT_VERSION: "2025.02"
  RUST_TOOLCHAIN: "stable"
  NODE_VERSION: "22.13.0"

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-ctrl:
    name: Build snapdog-ctrl
    runs-on: ubuntu-24.04
    needs: release-please
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target aarch64-unknown-linux-gnu
          rustup default "$RUST_TOOLCHAIN"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: snapdog-ctrl/webui/package-lock.json

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: snapdog-ctrl
          key: aarch64-release

      - name: Install aarch64 linker
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i '/^Architectures:/d' /etc/apt/sources.list.d/ubuntu.sources
          sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          printf 'Types: deb\nURIs: http://ports.ubuntu.com/ubuntu-ports\nSuites: noble noble-updates\nComponents: main universe\nArchitectures: arm64\n' | sudo tee /etc/apt/sources.list.d/arm64-ports.sources
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross \
            libavahi-compat-libdnssd-dev:arm64

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
        run: |
          cd snapdog-ctrl/webui && npm install --prefer-offline && npm run build && cd ../..
          cd snapdog-ctrl && cargo build --locked --release --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/snapdog-ctrl ../snapdog-ctrl-binary

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snapdog-ctrl-binary
          path: snapdog-ctrl-binary
          if-no-files-found: error
          retention-days: 7

  build-image:
    name: Build image (${{ matrix.pi }})
    runs-on: [self-hosted, linux, x64, buildroot]
    needs: [release-please, build-ctrl]
    strategy:
      fail-fast: false
      matrix:
        pi: [pi3, pi4, pi5]
    env:
      BR2_DL_DIR: /dl
      BR2_CCACHE_DIR: /ccache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: snapdog-ctrl-binary

      - name: Determine version
        id: version
        run: |
          if [ "${{ needs.release-please.outputs.release_created }}" = "true" ]; then
            echo "version=${{ needs.release-please.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            BASE=$(cat VERSION)
            echo "version=${BASE}-beta.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup buildroot
        run: |
          ln -sfn /srv/${{ matrix.pi }} ../buildroot-${{ matrix.pi }}
          make setup

      - name: Build
        run: |
          chmod 755 snapdog-ctrl-binary
          make PI=${{ matrix.pi }} VERSION="${{ steps.version.outputs.version }}" config
          make PI=${{ matrix.pi }} VERSION="${{ steps.version.outputs.version }}" build

      - name: Generate Buildroot legal manifest
        run: |
          cd ../buildroot
          make O="${{ github.workspace }}/../buildroot-${{ matrix.pi }}" \
            BR2_EXTERNAL="${{ github.workspace }}/buildroot" \
            SNAPDOG_PI_VERSION="${{ matrix.pi == 'pi3' && '3' || matrix.pi == 'pi4' && '4' || '5' }}" \
            legal-info

      - name: Package
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMG="../buildroot-${{ matrix.pi }}/images/sdcard.img"
          OUT="snapdog-os-${{ matrix.pi }}-${VERSION}.img.gz"
          BUNDLE="snapdog-os-${{ matrix.pi }}-${VERSION}.raucb"
          SBOM="snapdog-os-${{ matrix.pi }}-${VERSION}-sbom.csv"
          CHECKSUMS="snapdog-os-${{ matrix.pi }}-${VERSION}.sha256"

          test -s "$IMG"
          PARTITIONS=$(sfdisk -J "$IMG" | jq '.partitiontable.partitions | length')
          test "$PARTITIONS" -eq 4

          gzip -n -c "$IMG" > "$OUT"
          cp "../buildroot-${{ matrix.pi }}/legal-info/manifest.csv" "$SBOM"

          # Generate RAUC bundle
          umask 077
          printf '%s\n' "${{ secrets.RAUC_CA_KEY_PEM }}" > rauc-ca.key.pem
          RAUC_KEY_FILE="$(pwd)/rauc-ca.key.pem" \
            buildroot/rauc/create-bundle.sh \
            "${{ matrix.pi }}" "$VERSION" \
            "../buildroot-${{ matrix.pi }}/images/rootfs.ext4" \
            "$BUNDLE"
          rm -f rauc-ca.key.pem

          sha256sum "$OUT" "$BUNDLE" "$SBOM" > "$CHECKSUMS"

          echo "image=${OUT}" >> "$GITHUB_OUTPUT"
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"
          echo "sbom=${SBOM}" >> "$GITHUB_OUTPUT"
          echo "checksums=${CHECKSUMS}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-${{ matrix.pi }}
          path: |
            ${{ steps.package.outputs.image }}
            ${{ steps.package.outputs.bundle }}
            ${{ steps.package.outputs.sbom }}
            ${{ steps.package.outputs.checksums }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish
    runs-on: ubuntu-24.04
    needs: [release-please, build-image]
    environment:
      name: ${{ needs.release-please.outputs.release_created == 'true' && 'stable' || 'beta' }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Attest artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: artifacts/**/*

      - name: Install publish tools
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-$(uname -m).zip" -o /tmp/awscli.zip
          unzip -q /tmp/awscli.zip -d /tmp && sudo /tmp/aws/install

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail

          test -n "${AWS_ACCESS_KEY_ID:-}" || { echo "Missing R2_ACCESS_KEY_ID"; exit 1; }
          test -n "${AWS_SECRET_ACCESS_KEY:-}" || { echo "Missing R2_SECRET_ACCESS_KEY"; exit 1; }
          test -n "${AWS_ENDPOINT_URL:-}" || { echo "Missing R2_ENDPOINT_URL"; exit 1; }

          if [ "${{ needs.release-please.outputs.release_created }}" = "true" ]; then
            VERSION="${{ needs.release-please.outputs.version }}"
            SUFFIX=""
          else
            VERSION="$(cat VERSION)-beta.${{ github.run_number }}"
            SUFFIX="-beta"
          fi

          for pi in pi3 pi4 pi5; do
            IMAGE="artifacts/image-${pi}/snapdog-os-${pi}-${VERSION}.img.gz"
            BUNDLE="artifacts/image-${pi}/snapdog-os-${pi}-${VERSION}.raucb"
            SBOM="artifacts/image-${pi}/snapdog-os-${pi}-${VERSION}-sbom.csv"
            CHECKSUMS="artifacts/image-${pi}/snapdog-os-${pi}-${VERSION}.sha256"

            test -s "$IMAGE"
            test -s "$BUNDLE"
            test -s "$SBOM"
            test -s "$CHECKSUMS"
            (cd "artifacts/image-${pi}" && sha256sum --check "snapdog-os-${pi}-${VERSION}.sha256")

            # Versioned archives (immutable)
            aws s3 cp "$IMAGE" "s3://${R2_BUCKET}/os/images/" \
              --cache-control "public, max-age=31536000, immutable" \
              --endpoint-url "$AWS_ENDPOINT_URL"
            aws s3 cp "$BUNDLE" "s3://${R2_BUCKET}/os/bundles/" \
              --cache-control "public, max-age=31536000, immutable" \
              --endpoint-url "$AWS_ENDPOINT_URL"
            aws s3 cp "$SBOM" "s3://${R2_BUCKET}/os/sbom/" \
              --cache-control "public, max-age=31536000, immutable" \
              --endpoint-url "$AWS_ENDPOINT_URL"

            # Flat "latest" bundle (overwritten each release, short cache)
            aws s3 cp "$BUNDLE" "s3://${R2_BUCKET}/os/bundles/snapdog-os-${pi}${SUFFIX}.raucb" \
              --cache-control "public, max-age=300" \
              --endpoint-url "$AWS_ENDPOINT_URL"

            # Stable release also overwrites the beta pointer
            if [ -z "$SUFFIX" ]; then
              aws s3 cp "$BUNDLE" "s3://${R2_BUCKET}/os/bundles/snapdog-os-${pi}-beta.raucb" \
                --cache-control "public, max-age=300" \
                --endpoint-url "$AWS_ENDPOINT_URL"
            fi
          done

      - name: Attach artifacts to GitHub Release
        if: needs.release-please.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t release_files < <(find artifacts -type f \( \
            -name '*.img.gz' -o \
            -name '*.raucb' -o \
            -name '*-sbom.csv' -o \
            -name '*.sha256' \
          \) | sort)
          test "${#release_files[@]}" -gt 0
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "${release_files[@]}" --clobber
